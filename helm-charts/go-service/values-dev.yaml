replicaCount: 1

image:
  tag: "v1"

service:
  type: ClusterIP

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: go.dev.local
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

configmap:
  APP_ENV: "development"
  LOG_LEVEL: "debug"
