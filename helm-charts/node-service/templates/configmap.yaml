apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "node-service.fullname" . }}-config
  labels:
    {{- include "node-service.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.configmap.APP_ENV | default "production" | quote }}
  LOG_LEVEL: {{ .Values.configmap.LOG_LEVEL | default "info" | quote }}
  PORT: {{ .Values.service.port | toString | quote }}
