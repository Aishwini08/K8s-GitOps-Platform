apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: production-operator
  namespace: production
rules:
  - apiGroups: ["", "apps", "autoscaling"]
    resources: ["pods", "deployments", "services", "configmaps", "horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: production-operator-binding
  namespace: production
subjects:
  - kind: Group
    name: production-operators
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: production-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: production-readonly
  namespace: production
rules:
  - apiGroups: ["", "apps", "autoscaling"]
    resources: ["pods", "deployments", "services", "configmaps", "horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: production-readonly-binding
  namespace: production
subjects:
  - kind: Group
    name: production-viewers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: production-readonly
  apiGroup: rbac.authorization.k8s.io
