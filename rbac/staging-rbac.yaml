apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: staging-developer
  namespace: staging
rules:
  - apiGroups: ["", "apps", "autoscaling"]
    resources: ["pods", "deployments", "services", "configmaps", "horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: staging-developer-binding
  namespace: staging
subjects:
  - kind: Group
    name: staging-developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: staging-developer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: staging-readonly
  namespace: staging
rules:
  - apiGroups: ["", "apps", "autoscaling"]
    resources: ["pods", "deployments", "services", "configmaps", "horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: staging-readonly-binding
  namespace: staging
subjects:
  - kind: Group
    name: staging-viewers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: staging-readonly
  apiGroup: rbac.authorization.k8s.io
