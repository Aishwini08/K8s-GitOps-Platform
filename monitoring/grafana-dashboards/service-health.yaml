apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-service-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  service-health.json: |
    {
      "title": "Per-Service Health",
      "uid": "service-health",
      "tags": ["kubernetes", "services"],
      "timezone": "browser",
      "schemaVersion": 36,
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "query": "label_values(kube_pod_info, namespace)",
            "label": "Namespace"
          },
          {
            "name": "pod",
            "type": "query",
            "query": "label_values(kube_pod_info{namespace=~'$namespace'}, pod)",
            "label": "Pod"
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~'$namespace', pod=~'$pod'}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=~'$namespace', pod=~'$pod'}) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=~'$namespace', pod=~'$pod'}) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Pod Ready Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 8 },
          "targets": [
            {
              "expr": "kube_pod_status_ready{namespace=~'$namespace', pod=~'$pod', condition='true'}",
              "legendFormat": "{{ pod }}"
            }
          ]
        },
        {
          "id": 5,
          "title": "HPA Replica Count",
          "type": "timeseries",
          "gridPos": { "h": 4, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=~'$namespace'}",
              "legendFormat": "{{ horizontalpodautoscaler }}"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" }
    }
