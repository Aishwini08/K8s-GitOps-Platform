apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
      "title": "Cluster Overview",
      "uid": "cluster-overview",
      "tags": ["kubernetes", "cluster"],
      "timezone": "browser",
      "schemaVersion": 36,
      "panels": [
        {
          "id": 1,
          "title": "Total Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace!='kube-system'})",
              "legendFormat": "Pods"
            }
          ]
        },
        {
          "id": 2,
          "title": "Node CPU Usage %",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "100 - (avg by(instance)(rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)",
              "legendFormat": "{{ instance }}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Node Memory Usage %",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{ instance }}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Pod Restart Count",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total)",
              "legendFormat": "Restarts"
            }
          ]
        },
        {
          "id": 5,
          "title": "CPU Usage Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace!='kube-system'}[5m])) by (namespace)",
              "legendFormat": "{{ namespace }}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Memory Usage Over Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace!='kube-system'}) by (namespace)",
              "legendFormat": "{{ namespace }}"
            }
          ]
        }
      ],
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" }
    }
